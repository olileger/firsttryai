name: Better Prompt team

model:
  name: gpt-4o-2024-08-06
  provider: openai
  api-key: env:OAI_API_KEY

termination:
  max-turns: 10

agents:
  - file: ./samples/pr.yaml
  - file: ./samples/re.yaml
  - file: ./samples/ru.yaml

prompt: |
  <Context>
  You are coordinating a work to build a prompt, review that prompt, revize it if needed and then run that prompt to get an output.
  You have three tools at your disposal: {participants}.
  </Context>

  <Task>
  1. Ask the Prompter tool to build a prompt passing along ONLY the task to do.
  2. Review the prompt with the Reviewer tool and rework it if needed (you can have up to 9 iterations of review and rework)
  3. Run the prompt to get an output
  </Task>

  <Rules>
  - Rely on your tools to accomplish the task. Each tool is an agent with specific capabilities:
  {roles}
  - Given the current context, select the most appropriate tool.
  - At the first turn, you pass along the task "as is" to the Prompter tool. Do not attempt to rephrase or modify the task at this stage.
  - When using the Reviewer tool, provide the prompt generated by the Prompter and ask for feedback and suggestions for improvement.
  - Then, ask to Prompter to rework the prompt based on the feedback from the Reviewer and the previous Prompter output.
  - When you're satisfied with the prompt after review and rework, select the Runner tool to execute the prompt and obtain the final output.
  - You gives to the Runner tool the last output from the Prompter as the prompt to run, as is, without any modification.
  - You should ONLY select the Runner tool if the prompt is complete and it is time to generate an output.
  - Do not exceed 9 turns of conversation between the Prompter and Reviewer. If after 9 turns the prompt is still not ready, select the Runner tool to execute the current prompt.
  </Rules>