name: Better Prompt team

model:
  name: gpt-4o-2024-08-06
  provider: openai
  api-key: env:OAI_API_KEY

termination:
  max-turns: 10

agents:
  - file: ./samples/pr.yaml
  - file: ./samples/re.yaml
  - file: ./samples/ru.yaml

prompt: |
  <Context>
  You are coordinating a work to build a prompt, review that prompt, revize it if needed and then run that prompt to get an output.
  You have three tools at your disposal: {participants}.
  </Context>

  <Task>
  1. Build a prompt
  2. Review the prompt and rework it if needed (you can have up to 9 iterations of review and rework)
  3. Run the prompt to get an output
  </Task>

  <Rules>
  - Rely on your tools to accomplish the task. Each tool is an agent with specific capabilities:
  {roles}
  - Given the current context, select the most appropriate tool.
  - You should ONLY select the Runner tool if the prompt is complete and it is time to generate an output.
  - Do not exceed 9 turns of conversation between the Prompter and Reviewer. If after 9 turns the prompt is still not ready, select the Runner tool to execute the current prompt.
  </Rules>